services:
  cloudcode:
    image: cloudcode:latest
    ports:
      - "8080:8080"
    environment:
      - HOST_DATA_DIR=${HOST_DATA_DIR:-${PWD}/data}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cloudcode-net
    restart: unless-stopped

networks:
  cloudcode-net:
    external: true
    name: cloudcode-net
